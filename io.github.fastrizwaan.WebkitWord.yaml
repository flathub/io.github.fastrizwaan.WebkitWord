id: io.github.fastrizwaan.WebkitWord
sdk: org.gnome.Sdk
runtime: org.gnome.Platform
runtime-version: '50'
command: webkitword
base: org.libreoffice.LibreOffice
base-version: stable
finish-args:
  - --share=ipc
  - --share=network
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=xdg-run/gvfs
  
modules:

  - name: WebkitWord
    buildsystem: simple
    build-commands:
      - ./setup -i --prefix=/app 
    sources:
      - type: git
        tag: v0.4
        commit: 6039668814397b4cf6ebc2a5748de9f1086c6259
        url: https://github.com/fastrizwaan/WebkitWord.git
